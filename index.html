<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منظومة إدارة الشحنات الذكية | Smart Shipment Manager</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <h1><i class="fa-solid fa-ship"></i> منصة الشحنات العالمية</h1>
        <p>إدارة وتتبع مشتريات الصين الخاصة بك</p>
      </div>
      <div class="global-settings glass-panel">
        <label for="globalExchangeRate"><i class="fa-solid fa-money-bill-transfer"></i> سعر صرف الدولار مقابل الدينار:</label>
        <div class="input-group">
          <input type="number" id="globalExchangeRate" value="7.00" step="0.01">
          <span class="currency">د.ل</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- Add New Shipment Section -->
      <section class="add-shipment-section glass-panel fade-in">
        <h2><i class="fa-solid fa-box-open"></i> تسجيل شحنة جديدة</h2>
        <form id="shipmentForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="itemName">اسم الشحنة / المنتج</label>
              <input type="text" id="itemName" placeholder="مثال: شاشات هاتف, ملابس..." required>
            </div>
            
            <div class="form-group">
              <label for="chinaCode">كود الصين (رقم الطلبية)</label>
              <input type="text" id="chinaCode" placeholder="رقم الطلب من المورد" required>
            </div>
            
            <div class="form-group">
              <label for="trackingCode">كود التتبع الدولي</label>
              <input type="text" id="trackingCode" placeholder="رقم تتبع شركة الشحن">
            </div>

            <div class="pricing-section" style="grid-column: 1 / -1; margin: 10px 0; border: 1px dashed #10b981; padding: 15px; border-radius: 12px; background: rgba(16, 185, 129, 0.05);">
              <h3 style="margin-bottom: 15px; color: #10b981; font-size: 1.1rem;"><i class="fa-solid fa-coins"></i> تفاصيل التكلفة والشحن</h3>
              <div class="form-grid" style="margin-bottom: 0;">
                <div class="form-group">
                  <label for="quantity">الكمية (عدد القطع أو الكراتين)</label>
                  <input type="number" id="quantity" placeholder="الكمية" value="1" min="1" required>
                </div>

                <div class="form-group">
                  <label for="costUSD">تكلفة البضاعة الإجمالية ($)</label>
                  <input type="number" id="costUSD" placeholder="0.00" step="0.01" required>
                </div>

                <div class="form-group">
                  <label for="cbmQuantity">حجم الشحنة (CBM)</label>
                  <input type="number" id="cbmQuantity" placeholder="مثال: 2.5" step="0.01">
                </div>

                <div class="form-group">
                  <label for="cbmPrice">سعر الـ CBM الواحد ($)</label>
                  <input type="number" id="cbmPrice" placeholder="تكلفة شحن المتر" step="0.01">
                </div>
              </div>
            </div>

            <div class="form-group">
              <label for="status">حالة الشحنة (تتبع)</label>
              <select id="status" required>
                <option value="تم الطلب وفي انتظار التجهيز">تم الطلب وفي انتظار التجهيز</option>
                <option value="في طريقها لمخزن الصين">في طريقها لمخزن الصين</option>
                <option value="الآن في مخزن الصين">الآن في مخزن الصين</option>
                <option value="واصلة لمخزن الصين ورايحة">واصلة لمخزن الصين ورايحة (مفقودة)</option>
                <option value="في الشحن الدولي">في الشحن الدولي (في البحر/الجو)</option>
                <option value="في ميناء الوصول (الجمارك)">في ميناء الوصول (الجمارك)</option>
                <option value="جاهزة للتسليم محلياً">جاهزة للتسليم محلياً</option>
                <option value="تم الاستلام">تم الاستلام ✅</option>
              </select>
            </div>

            <div class="form-group">
              <label for="dateChina">تاريخ الوصول لمخزن الصين</label>
              <input type="date" id="dateChina" class="date-input">
            </div>

            <div class="form-group">
              <label for="dateDeparture">تاريخ الخروج من الصين</label>
              <input type="date" id="dateDeparture" class="date-input">
            </div>

            <div class="form-group">
              <label for="dateLibya">تاريخ الوصول لليبيا</label>
              <input type="date" id="dateLibya" class="date-input">
            </div>

            <div class="shaheen-section" style="grid-column: 1 / -1; margin: 10px 0; border: 1px dashed var(--primary-light); padding: 15px; border-radius: 12px; background: rgba(124, 77, 255, 0.05);">
              <h3 style="margin-bottom: 15px; color: var(--primary-color); font-size: 1.1rem;"><i class="fa-solid fa-building-circle-check"></i> بيانات مخزن الشاهين</h3>
              <div class="form-grid" style="margin-bottom: 0;">
                <div class="form-group">
                  <label for="shaheenCode">رقم الشحنة (الشاهين)</label>
                  <input type="text" id="shaheenCode" placeholder="رقم أو كود الشحنة">
                </div>

                <div class="form-group">
                  <label for="tripNumber">رقم الرحلة (الشاهين)</label>
                  <input type="text" id="tripNumber" placeholder="رقم الرحلة أو الحاوية لدى الشاهين">
                </div>
              </div>
            </div>

            <div class="form-group file-upload-group">
              <label for="itemImage">إرفاق صورة <i class="fa-solid fa-cloud-arrow-up"></i></label>
              <input type="file" id="itemImage" accept="image/*">
            </div>
          </div>
          
          <div class="form-summary">
            <div class="cost-preview">
              <span>التكلفة المتوقعة بالدينار:</span>
              <span id="costPreviewLYD" class="highlight">0.00 د.ل</span>
            </div>
            <button type="submit" id="submitBtn" class="btn-primary" style="flex: 1;">
              <i class="fa-solid fa-plus"></i> إضافة الشحنة
            </button>
            <button type="button" id="cancelEditBtn" class="btn-secondary" style="display: none; padding: 12px 20px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 600;">
              <i class="fa-solid fa-times"></i> إلغاء التصحيح
            </button>
          </div>
        </form>
      </section>

      <!-- Shipments List Section -->
      <section class="shipments-list-section">
        <div class="section-header">
          <h2><i class="fa-solid fa-cubes"></i> شحناتي الحالية</h2>
          <div class="stats glass-badge">إجمالي شحناتك: <span id="totalShipmentsCount">0</span></div>
        </div>
        
        <div class="shipments-grid" id="shipmentsContainer">
          <!-- Cards will be injected by JavaScript -->
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
