<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منظومة إدارة الشحنات الذكية | Smart Shipment Manager</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
:root {
  --bg-primary: #0f111a;
  --bg-secondary: #171a26;
  --glass-bg: rgba(23, 26, 38, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  
  --primary-accent: #00e5ff;
  --primary-accent-glow: rgba(0, 229, 255, 0.4);
  --secondary-accent: #7c3aed;
  
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  
  --status-pending: #f59e0b;
  --status-transit: #3b82f6;
  --status-customs: #ef4444;
  --status-ready: #10b981;
  
  --font-family: 'Tajawal', sans-serif;
  --border-radius-lg: 16px;
  --border-radius-md: 10px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--bg-primary);
  background-image: 
    radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.05) 0%, transparent 40%);
  color: var(--text-main);
  font-family: var(--font-family);
  min-height: 100vh;
  line-height: 1.6;
}

.app-container {
  max-width: 1300px;
  margin: 0 auto;
  padding: 2rem;
}

/* Glassmorphism Utilities */
.glass-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  border-radius: var(--border-radius-lg);
}

/* Header */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
  gap: 1.5rem;
}

.logo-area h1 {
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(to right, var(--primary-accent), #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.3rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.logo-area p {
  color: var(--text-muted);
  font-size: 1.1rem;
}

/* Global Settings */
.global-settings {
  padding: 1.2rem 1.8rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.global-settings label {
  font-weight: 500;
  color: var(--text-muted);
}

.input-group {
  display: flex;
  align-items: center;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 8px;
  padding: 0.4rem 0.8rem;
  border: 1px solid var(--glass-border);
}

.input-group input {
  background: transparent;
  border: none;
  color: var(--primary-accent);
  font-weight: 700;
  font-size: 1.2rem;
  width: 80px;
  text-align: center;
  outline: none;
}

/* Form Section */
.add-shipment-section {
  padding: 2rem;
  margin-bottom: 3rem;
}

.add-shipment-section h2 {
  font-size: 1.6rem;
  margin-bottom: 1.5rem;
  color: var(--text-main);
  border-bottom: 1px solid var(--glass-border);
  padding-bottom: 1rem;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.form-group label {
  font-weight: 500;
  font-size: 0.95rem;
  color: var(--text-muted);
}

.form-group input, .form-group select {
  font-family: var(--font-family);
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-main);
  padding: 0.9rem 1rem;
  border-radius: var(--border-radius-md);
  font-size: 1rem;
  transition: all 0.3s ease;
}

.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--primary-accent);
  box-shadow: 0 0 10px var(--primary-accent-glow);
}

.file-upload-group input[type="file"] {
  padding: 0.6rem;
}

.form-summary {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--glass-border);
}

.cost-preview {
  font-size: 1.1rem;
  color: var(--text-muted);
}

.cost-preview .highlight {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--primary-accent);
  margin-right: 0.5rem;
}

.btn-primary {
  background: linear-gradient(135deg, var(--secondary-accent), #4f46e5);
  color: white;
  border: none;
  padding: 1rem 2rem;
  border-radius: var(--border-radius-md);
  font-size: 1.1rem;
  font-weight: 700;
  font-family: var(--font-family);
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(124, 58, 237, 0.6);
}

/* Shipments List */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
}

.section-header h2 {
  font-size: 1.8rem;
}

.glass-badge {
  background: rgba(0, 229, 255, 0.1);
  border: 1px solid rgba(0, 229, 255, 0.2);
  color: var(--primary-accent);
  padding: 0.4rem 1rem;
  border-radius: 20px;
  font-weight: 700;
}

.shipments-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 2rem;
}

/* Shipment Card */
.shipment-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  position: relative;
}

.shipment-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  border-color: rgba(255,255,255,0.15);
}

.card-image-holder {
  height: 200px;
  background: rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-image-holder img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.shipment-card:hover .card-image-holder img {
  transform: scale(1.05);
}

.card-image-holder .no-image {
  color: var(--text-muted);
  font-size: 3rem;
  opacity: 0.3;
}

.status-badge {
  position: absolute;
  top: 15px;
  right: 15px;
  padding: 0.4rem 0.8rem;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  border: 1px solid currentColor;
}

.card-content {
  padding: 1.5rem;
}

.card-title {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 1rem;
  color: var(--primary-accent);
}

.card-details {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-bottom: 1.5rem;
  font-size: 0.95rem;
}

.card-details p {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.card-details p i {
  color: var(--text-muted);
  width: 20px;
}

.card-price {
  background: rgba(0,0,0,0.3);
  padding: 1rem;
  border-radius: var(--border-radius-md);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--glass-border);
}

.card-price .usd {
  color: var(--text-muted);
  font-size: 0.95rem;
}

.card-price .lyd {
  font-size: 1.3rem;
  font-weight: 800;
  color: #10b981;
}

.delete-btn {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(239, 68, 68, 0.8);
  color: white;
  border: none;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.delete-btn:hover {
  background: #ef4444;
  transform: scale(1.1);
}

/* Animations */
.fade-in {
  animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .app-header {
    flex-direction: column;
    align-items: flex-start;
  }
  .form-summary {
    flex-direction: column;
    align-items: stretch;
    gap: 1rem;
  }
}

</style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <h1><i class="fa-solid fa-ship"></i> منصة الشحنات العالمية</h1>
        <p>إدارة وتتبع مشتريات الصين الخاصة بك</p>
      </div>
      <div class="global-settings glass-panel">
        <label for="globalExchangeRate"><i class="fa-solid fa-money-bill-transfer"></i> سعر صرف الدولار مقابل الدينار:</label>
        <div class="input-group">
          <input type="number" id="globalExchangeRate" value="7.00" step="0.01">
          <span class="currency">د.ل</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- Add New Shipment Section -->
      <section class="add-shipment-section glass-panel fade-in">
        <h2><i class="fa-solid fa-box-open"></i> تسجيل شحنة جديدة</h2>
        <form id="shipmentForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="itemName">اسم الشحنة / المنتج</label>
              <input type="text" id="itemName" placeholder="مثال: شاشات هاتف, ملابس..." required>
            </div>
            
            <div class="form-group">
              <label for="chinaCode">كود الصين (رقم الطلبية)</label>
              <input type="text" id="chinaCode" placeholder="رقم الطلب من المورد" required>
            </div>
            
            <div class="form-group">
              <label for="trackingCode">كود التتبع الدولي</label>
              <input type="text" id="trackingCode" placeholder="رقم تتبع شركة الشحن">
            </div>

            <div class="form-group">
              <label for="costUSD">التكلفة (بالدولار $)</label>
              <input type="number" id="costUSD" placeholder="0.00" step="0.01" required>
            </div>

            <div class="form-group">
              <label for="status">حالة الشحنة (تتبع)</label>
              <select id="status" required>
                <option value="تم الطلب وفي انتظار التجهيز">تم الطلب وفي انتظار التجهيز</option>
                <option value="في طريقها لمخزن الصين">في طريقها لمخزن الصين</option>
                <option value="في الشحن الدولي">في الشحن الدولي (في البحر/الجو)</option>
                <option value="في ميناء الوصول (الجمارك)">في ميناء الوصول (الجمارك)</option>
                <option value="جاهزة للتسليم محلياً">جاهزة للتسليم محلياً</option>
                <option value="تم الاستلام">تم الاستلام ✅</option>
              </select>
            </div>

            <div class="form-group">
              <label for="dateChina">تاريخ الوصول لمخزن الصين</label>
              <input type="date" id="dateChina" class="date-input">
            </div>

            <div class="form-group">
              <label for="dateDeparture">تاريخ الخروج من الصين</label>
              <input type="date" id="dateDeparture" class="date-input">
            </div>

            <div class="form-group">
              <label for="dateLibya">تاريخ الوصول لليبيا</label>
              <input type="date" id="dateLibya" class="date-input">
            </div>

            <div class="form-group file-upload-group">
              <label for="itemImage">إرفاق صورة <i class="fa-solid fa-cloud-arrow-up"></i></label>
              <input type="file" id="itemImage" accept="image/*">
            </div>
          </div>
          
          <div class="form-summary">
            <div class="cost-preview">
              <span>التكلفة المتوقعة بالدينار:</span>
              <span id="costPreviewLYD" class="highlight">0.00 د.ل</span>
            </div>
            <button type="submit" class="btn-primary">
              <i class="fa-solid fa-plus"></i> إضافة الشحنة
            </button>
          </div>
        </form>
      </section>

      <!-- Shipments List Section -->
      <section class="shipments-list-section">
        <div class="section-header">
          <h2><i class="fa-solid fa-cubes"></i> شحناتي الحالية</h2>
          <div class="stats glass-badge">إجمالي شحناتك: <span id="totalShipmentsCount">0</span></div>
        </div>
        
        <div class="shipments-grid" id="shipmentsContainer">
          <!-- Cards will be injected by JavaScript -->
        </div>
      </section>
    </main>
  </div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcP3Ud60BC-RKD7bYVBx8bcro--L4mkLQ",
  authDomain: "davinci-a9db7.firebaseapp.com",
  databaseURL: "https://davinci-a9db7-default-rtdb.firebaseio.com",
  projectId: "davinci-a9db7",
  storageBucket: "davinci-a9db7.firebasestorage.app",
  messagingSenderId: "621430667796",
  appId: "1:621430667796:web:dbb234b99fd4a90da04501"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const shipmentsRef = ref(db, 'shipments');

let shipments = [];
let currentExchangeRate = 7.00;

document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('shipmentForm');
  const globalExchangeRateInput = document.getElementById('globalExchangeRate');
  const costUSDInput = document.getElementById('costUSD');
  const costPreviewLYD = document.getElementById('costPreviewLYD');
  const shipmentsContainer = document.getElementById('shipmentsContainer');
  const totalShipmentsCount = document.getElementById('totalShipmentsCount');

  // Load user's preferred exchange rate from LocalStorage
  currentExchangeRate = parseFloat(localStorage.getItem('exchangeRate')) || 7.00;
  globalExchangeRateInput.value = currentExchangeRate;

  // Real-time Sync from Firebase
  onValue(shipmentsRef, (snapshot) => {
    const data = snapshot.val();
    shipments = [];
    if (data) {
      for (let key in data) {
        shipments.push({ id: key, ...data[key] });
      }
    }
    // Render shipments
    renderShipments();
  });

  // Calculate LYD automatically when USD typed
  costUSDInput.addEventListener('input', updateCostPreview);

  // Update Exchange Rate globally
  globalExchangeRateInput.addEventListener('input', (e) => {
    currentExchangeRate = parseFloat(e.target.value) || 0;
    localStorage.setItem('exchangeRate', currentExchangeRate); // Save preference
    updateCostPreview();
    renderShipments(); // Update all cards
  });

  // Add new shipment via Form
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const itemName = document.getElementById('itemName').value;
    const chinaCode = document.getElementById('chinaCode').value;
    const trackingCode = document.getElementById('trackingCode').value;
    const costUSD = parseFloat(costUSDInput.value);
    const status = document.getElementById('status').value;
    
    // Dates
    const dateChina = document.getElementById('dateChina').value;
    const dateDeparture = document.getElementById('dateDeparture').value;
    const dateLibya = document.getElementById('dateLibya').value;

    const imageInput = document.getElementById('itemImage');

    let imageBase64 = null;
    if (imageInput.files && imageInput.files[0]) {
      imageBase64 = await toBase64(imageInput.files[0]);
    }

    const newShipment = {
      itemName,
      chinaCode,
      trackingCode: trackingCode || 'لم يتم الإصدار بعد',
      costUSD,
      status,
      dateChina,
      dateDeparture,
      dateLibya,
      image: imageBase64,
      createdAt: new Date().toLocaleDateString('ar-LY'),
      timestamp: Date.now() // For sorting
    };

    // Push DIRECTLY to Firebase Cloud ☁️
    push(shipmentsRef, newShipment);
    
    form.reset();
    updateCostPreview();
  });

  // Image to text (base64) converter
  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }

  // Update LYD label directly
  function updateCostPreview() {
    const usd = parseFloat(costUSDInput.value) || 0;
    const lyd = (usd * currentExchangeRate).toFixed(2);
    costPreviewLYD.textContent = `${lyd} د.ل`;
  }

  // Global delete function
  window.deleteShipment = function(id) {
    if(confirm('هل أنت متأكد من حذف هذه الشحنة نهائياً من جميع الأجهزة؟')) {
      const itemRef = ref(db, 'shipments/' + id);
      remove(itemRef); // Removes from Firebase Cloud ☁️
    }
  };

  // Render HTML based on Firebase Data
  function renderShipments() {
    shipmentsContainer.innerHTML = '';
    totalShipmentsCount.textContent = shipments.length;

    if (shipments.length === 0) {
      shipmentsContainer.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">لا توجد شحنات مسجلة في التخزين السحابي...</p>';
      return;
    }

    // Sort newest first
    shipments.sort((a,b) => b.timestamp - a.timestamp).forEach(shipment => {
      const lydCost = (shipment.costUSD * currentExchangeRate).toFixed(2);
      
      let statusColor = 'var(--status-transit)';
      if (shipment.status.includes('تم الطلب')) statusColor = 'var(--status-pending)';
      if (shipment.status.includes('الجمارك')) statusColor = 'var(--status-customs)';
      if (shipment.status.includes('جاهزة') || shipment.status.includes('الاستلام')) statusColor = 'var(--status-ready)';

      const card = document.createElement('div');
      card.className = 'shipment-card fade-in';
      card.innerHTML = `
        <button class="delete-btn" onclick="deleteShipment('${shipment.id}')" title="حذف الشحنة من السحابة">
          <i class="fa-solid fa-trash"></i>
        </button>
        <div class="card-image-holder">
          <div class="status-badge" style="color: ${statusColor}; border-color: ${statusColor}">
            ${shipment.status}
          </div>
          ${shipment.image 
            ? `<img src="${shipment.image}" alt="${shipment.itemName}">` 
            : `<i class="fa-solid fa-box no-image"></i>`}
        </div>
        <div class="card-content">
          <h3 class="card-title">${shipment.itemName}</h3>
          
          <div class="card-details">
            <p><i class="fa-solid fa-barcode"></i> كود الصين: <strong>${shipment.chinaCode}</strong></p>
            <p><i class="fa-solid fa-truck-fast"></i> رقم التتبع: <strong>${shipment.trackingCode}</strong></p>
            <p><i class="fa-solid fa-calendar-plus"></i> تاريخ الإضافة: <strong>${shipment.createdAt}</strong></p>
            ${shipment.dateChina ? `<p><i class="fa-solid fa-building-flag"></i> وصل مخزن الصين: <strong style="color:var(--status-pending)">${shipment.dateChina}</strong></p>` : ''}
            ${shipment.dateDeparture ? `<p><i class="fa-solid fa-plane-departure"></i> غادر الصين: <strong style="color:var(--status-transit)">${shipment.dateDeparture}</strong></p>` : ''}
            ${shipment.dateLibya ? `<p><i class="fa-solid fa-location-dot"></i> وصل ليبيا: <strong style="color:var(--status-ready)">${shipment.dateLibya}</strong></p>` : ''}
          </div>

          <div class="card-price">
            <div class="usd">التكلفة: ${shipment.costUSD.toFixed(2)}</div>
            <div class="lyd">${lydCost} د.ل</div>
          </div>
        </div>
      `;
      shipmentsContainer.appendChild(card);
    });
  }

  updateCostPreview();
});

</script>
</body>
</html>
