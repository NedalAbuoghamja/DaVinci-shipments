<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منظومة إدارة الشحنات الذكية | Smart Shipment Manager</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
:root {
  --bg-primary: #0f111a;
  --bg-secondary: #171a26;
  --glass-bg: rgba(23, 26, 38, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  
  --primary-accent: #00e5ff;
  --primary-accent-glow: rgba(0, 229, 255, 0.4);
  --secondary-accent: #7c3aed;
  
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  
  --status-pending: #f59e0b;
  --status-transit: #3b82f6;
  --status-customs: #ef4444;
  --status-ready: #10b981;
  
  --font-family: 'Tajawal', sans-serif;
  --border-radius-lg: 16px;
  --border-radius-md: 10px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--bg-primary);
  background-image: 
    radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.05) 0%, transparent 40%);
  color: var(--text-main);
  font-family: var(--font-family);
  min-height: 100vh;
  line-height: 1.6;
  text-align: right;
}

.app-container {
  max-width: 1300px;
  margin: 0 auto;
  padding: 2rem;
}

.glass-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  border-radius: var(--border-radius-lg);
}

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
  gap: 1.5rem;
}

.logo-area h1 {
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(to right, var(--primary-accent), #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.3rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.logo-area p {
  color: var(--text-muted);
  font-size: 1.1rem;
}

.global-settings {
  padding: 1.2rem 1.8rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.global-settings label {
  font-weight: 500;
  color: var(--text-muted);
}

.input-group {
  display: flex;
  align-items: center;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 8px;
  padding: 0.4rem 0.8rem;
  border: 1px solid var(--glass-border);
}

.input-group input {
  background: transparent;
  border: none;
  color: var(--primary-accent);
  font-weight: 700;
  font-size: 1.2rem;
  width: 80px;
  text-align: center;
  outline: none;
}

.add-shipment-section {
  padding: 2rem;
  margin-bottom: 3rem;
}

.add-shipment-section h2 {
  font-size: 1.6rem;
  margin-bottom: 1.5rem;
  color: var(--text-main);
  border-bottom: 1px solid var(--glass-border);
  padding-bottom: 1rem;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.form-group label {
  font-weight: 500;
  font-size: 0.95rem;
  color: var(--text-muted);
}

.form-group input, .form-group select {
  font-family: var(--font-family);
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-main);
  padding: 0.9rem 1rem;
  border-radius: var(--border-radius-md);
  font-size: 1rem;
  transition: all 0.3s ease;
  text-align: right;
}

.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--primary-accent);
  box-shadow: 0 0 10px var(--primary-accent-glow);
}

.form-summary {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--glass-border);
}

.cost-preview {
  font-size: 1.1rem;
  color: var(--text-muted);
}

.cost-preview .highlight {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--primary-accent);
  margin-right: 0.5rem;
}

.btn-primary {
  background: linear-gradient(135deg, var(--secondary-accent), #4f46e5);
  color: white;
  border: none;
  padding: 1rem 2rem;
  border-radius: var(--border-radius-md);
  font-size: 1.1rem;
  font-weight: 700;
  font-family: var(--font-family);
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
}

.shipments-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 2rem;
}

.shipment-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  position: relative;
}

.card-image-holder {
  height: 200px;
  background: rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-image-holder img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.status-badge {
  position: absolute;
  top: 15px;
  right: 15px;
  padding: 0.4rem 0.8rem;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  border: 1px solid currentColor;
}

.card-content {
  padding: 1.5rem;
}

.card-title {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 1rem;
  color: var(--primary-accent);
}

.card-details {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-bottom: 1.5rem;
  font-size: 0.95rem;
}

.card-price {
  background: rgba(0,0,0,0.3);
  padding: 1rem;
  border-radius: var(--border-radius-md);
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px solid var(--glass-border);
}

.delete-btn {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(239, 68, 68, 0.8);
  color: white;
  border: none;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.fade-in {
  animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .app-header {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <h1><i class="fa-solid fa-ship"></i> منصة الشحنات العالمية</h1>
        <p>إدارة وتتبع مشتريات الصين الخاصة بك</p>
      </div>
      <div class="global-settings glass-panel">
        <label for="globalExchangeRate"><i class="fa-solid fa-money-bill-transfer"></i> سعر صرف الدولار:</label>
        <div class="input-group">
          <input type="number" id="globalExchangeRate" value="7.00" step="0.01">
          <span class="currency">د.ل</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="add-shipment-section glass-panel fade-in">
        <h2><i class="fa-solid fa-box-open"></i> تسجيل شحنة جديدة</h2>
        <form id="shipmentForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="itemName">اسم الشحنة</label>
              <input type="text" id="itemName" placeholder="مثال: ملابس..." required>
            </div>
            <div class="form-group">
              <label for="chinaCode">كود الصين</label>
              <input type="text" id="chinaCode" required>
            </div>
            <div class="form-group">
              <label for="costUSD">تكلفة البضاعة ($)</label>
              <input type="number" id="costUSD" placeholder="0.00" step="0.01" required>
            </div>
            <div class="form-group">
              <label for="quantity">الكمية</label>
              <input type="number" id="quantity" value="1" min="1">
            </div>

            <div id="seaShippingFields" class="form-grid" style="grid-column: 1 / -1; display: grid; margin-bottom: 0;">
              <div class="form-group">
                <label for="cbmQuantity">حجم الشحنة (CBM)</label>
                <input type="number" id="cbmQuantity" step="0.01" value="0.01">
              </div>
              <div class="form-group">
                <label for="cbmPrice">سعر المتر ($)</label>
                <input type="number" id="cbmPrice" step="0.01" value="175">
              </div>
            </div>

            <div id="airShippingFields" class="form-grid" style="grid-column: 1 / -1; display: none; margin-bottom: 0;">
              <div class="form-group">
                <label for="weightKG">الوزن (KG)</label>
                <input type="number" id="weightKG" step="0.01" value="0">
              </div>
              <div class="form-group">
                <label for="kgPrice">سعر الكيلو ($)</label>
                <input type="number" id="kgPrice" step="0.01" value="10">
              </div>
            </div>

            <div class="form-group">
              <label for="additionalCosts">تكاليف إضافية ($)</label>
              <input type="number" id="additionalCosts" step="0.01" value="0">
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
              <label>نوع الشحن</label>
              <div style="display: flex; gap: 10px;">
                <label style="flex: 1; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1);">
                  <input type="radio" name="shippingType" value="جوي"> <i class="fa-solid fa-plane"></i> جوي
                </label>
                <label style="flex: 1; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1);">
                  <input type="radio" name="shippingType" value="بحري" checked> <i class="fa-solid fa-ship"></i> بحري
                </label>
              </div>
            </div>

            <div class="form-group">
              <label for="status">حالة الشحنة</label>
              <select id="status">
                <option value="تم الطلب وفي انتظار التجهيز">تم الطلب وفي انتظار التجهيز</option>
                <option value="في طريقها لمخزن الصين">في طريقها لمخزن الصين</option>
                <option value="في الشحن الدولي">في الشحن الدولي</option>
                <option value="في ميناء الوصول (الجمارك)">في ميناء الوصول (الجمارك)</option>
                <option value="جاهزة للتسليم محلياً">جاهزة للتسليم محلياً</option>
                <option value="تم الاستلام">تم الاستلام ✅</option>
              </select>
            </div>
            
            <div class="form-group file-upload-group">
              <label for="itemImage">إرفاق صورة <i class="fa-solid fa-cloud-arrow-up"></i></label>
              <input type="file" id="itemImage" accept="image/*">
            </div>
          </div>
          
          <div class="form-summary">
            <div class="cost-preview">
              <span>التكلفة المتوقعة:</span>
              <span id="costPreviewLYD" class="highlight">0.00 د.ل</span>
            </div>
            <button type="submit" class="btn-primary">إضافة الشحنة</button>
          </div>
        </form>
      </section>

      <section id="financialSummarySection" class="glass-panel fade-in" style="margin-bottom: 3rem; padding: 2rem;">
        <h2 style="margin-bottom: 20px; font-size: 1.5rem;"><i class="fa-solid fa-chart-pie"></i> ملخص التكاليف المالية</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;">
          <div class="glass-panel" style="padding: 15px; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.8rem;">البضاعة ($)</p>
            <h3 id="totalGoodsUSD" style="color: var(--primary-accent);">$0.00</h3>
          </div>
          <div class="glass-panel" style="padding: 15px; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.8rem;">الشحن ($)</p>
            <h3 id="totalShippingUSD" style="color: var(--status-pending);">$0.00</h3>
          </div>
          <div class="glass-panel" style="padding: 15px; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.8rem;">إضافي ($)</p>
            <h3 id="totalExtraUSD" style="color: var(--status-customs);">$0.00</h3>
          </div>
          <div class="glass-panel" style="padding: 15px; text-align: center; background: rgba(16, 185, 129, 0.1);">
            <p style="font-weight: bold; font-size: 0.8rem;">الإجمالي ($)</p>
            <h3 id="grandTotalUSD" style="color: var(--status-ready);">$0.00</h3>
          </div>
          <div class="glass-panel" style="padding: 15px; text-align: center; background: rgba(0, 229, 255, 0.1);">
            <p style="font-weight: bold; font-size: 0.8rem;">المجموع بالدينار</p>
            <h3 id="grandTotalLYD" style="color: var(--primary-accent);">0.00 د.ل</h3>
          </div>
        </div>
      </section>

      <section class="shipments-list-section">
        <div class="section-header">
          <h2><i class="fa-solid fa-cubes"></i> شحناتي الحالية</h2>
          <div class="stats glass-badge">العدد: <span id="totalShipmentsCount">0</span></div>
        </div>
        <div class="shipments-grid" id="shipmentsContainer"></div>
      </section>
    </main>
  </div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcP3Ud60BC-RKD7bYVBx8bcro--L4mkLQ",
  authDomain: "davinci-a9db7.firebaseapp.com",
  databaseURL: "https://davinci-a9db7-default-rtdb.firebaseio.com",
  projectId: "davinci-a9db7",
  storageBucket: "davinci-a9db7.firebasestorage.app",
  messagingSenderId: "621430667796",
  appId: "1:621430667796:web:dbb234b99fd4a90da04501"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const shipmentsRef = ref(db, 'shipments');

let shipments = [];
let currentExchangeRate = 7.00;

document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('shipmentForm');
  const globalExchangeRateInput = document.getElementById('globalExchangeRate');
  const costUSDInput = document.getElementById('costUSD');
  const costPreviewLYD = document.getElementById('costPreviewLYD');
  const shipmentsContainer = document.getElementById('shipmentsContainer');
  const seaShippingFields = document.getElementById('seaShippingFields');
  const airShippingFields = document.getElementById('airShippingFields');

  onValue(shipmentsRef, (snapshot) => {
    const data = snapshot.val();
    shipments = [];
    if (data) {
      for (let key in data) shipments.push({ id: key, ...data[key] });
    }
    renderShipments();
  });

  const updateAll = () => {
    updateCostPreview();
    renderShipments();
  };

  form.addEventListener('input', updateCostPreview);

  document.querySelectorAll('input[name="shippingType"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === 'جوي') {
        seaShippingFields.style.display = 'none';
        airShippingFields.style.display = 'grid';
      } else {
        seaShippingFields.style.display = 'grid';
        airShippingFields.style.display = 'none';
      }
      updateCostPreview();
    });
  });

  globalExchangeRateInput.addEventListener('input', (e) => {
    currentExchangeRate = parseFloat(e.target.value) || 0;
    updateAll();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const imageInput = document.getElementById('itemImage');
    let imageBase64 = null;
    if (imageInput.files && imageInput.files[0]) imageBase64 = await toBase64(imageInput.files[0]);

    const newShipment = {
      itemName: document.getElementById('itemName').value,
      chinaCode: document.getElementById('chinaCode').value,
      costUSD: parseFloat(costUSDInput.value),
      quantity: parseInt(document.getElementById('quantity').value) || 1,
      cbmQuantity: parseFloat(document.getElementById('cbmQuantity').value) || 0,
      cbmPrice: parseFloat(document.getElementById('cbmPrice').value) || 0,
      weightKG: parseFloat(document.getElementById('weightKG').value) || 0,
      kgPrice: parseFloat(document.getElementById('kgPrice').value) || 0,
      additionalCosts: parseFloat(document.getElementById('additionalCosts').value) || 0,
      shippingType: document.querySelector('input[name="shippingType"]:checked').value,
      status: document.getElementById('status').value,
      image: imageBase64,
      createdAt: new Date().toLocaleDateString('ar-LY'),
      timestamp: Date.now()
    };
    push(shipmentsRef, newShipment);
    form.reset();
    updateCostPreview();
  });

  function updateCostPreview() {
    const usd = parseFloat(costUSDInput.value) || 0;
    const shipType = document.querySelector('input[name="shippingType"]:checked').value;
    let shipUsd = 0;
    if (shipType === 'جوي') {
      shipUsd = (parseFloat(document.getElementById('weightKG').value) || 0) * (parseFloat(document.getElementById('kgPrice').value) || 0);
    } else {
      shipUsd = (parseFloat(document.getElementById('cbmQuantity').value) || 0) * (parseFloat(document.getElementById('cbmPrice').value) || 0);
    }
    const extra = parseFloat(document.getElementById('additionalCosts').value) || 0;
    const total = usd + shipUsd + extra;
    costPreviewLYD.textContent = `${(total * currentExchangeRate).toFixed(2)} د.ل`;
  }

  function renderShipments() {
    shipmentsContainer.innerHTML = '';
    document.getElementById('totalShipmentsCount').textContent = shipments.length;
    let tg = 0, ts = 0, te = 0;

    shipments.sort((a,b) => b.timestamp - a.timestamp).forEach(s => {
      const shipCost = s.shippingType === 'جوي' ? (s.weightKG * s.kgPrice) : (s.cbmQuantity * s.cbmPrice);
      const total = s.costUSD + shipCost + (s.additionalCosts || 0);
      tg += s.costUSD; ts += shipCost; te += (s.additionalCosts || 0);

      const card = document.createElement('div');
      card.className = 'shipment-card fade-in';
      card.innerHTML = `
        <button class="delete-btn" onclick="deleteShipment('${s.id}')"><i class="fa-solid fa-trash"></i></button>
        <div class="card-image-holder">
          <div class="status-badge">${s.status}</div>
          ${s.image ? `<img src="${s.image}">` : `<i class="fa-solid fa-box" style="font-size:3rem; opacity:0.2;"></i>`}
        </div>
        <div class="card-content">
          <h3 class="card-title">${s.itemName}</h3>
          <div class="card-details">
            <p>كود: ${s.chinaCode}</p>
            <p>الشحن: ${s.shippingType} (${s.shippingType === 'جوي' ? s.weightKG + ' KG' : s.cbmQuantity + ' CBM'})</p>
            <p>إضافي: $${s.additionalCosts || 0}</p>
          </div>
          <div class="card-price">
            <div style="font-size:0.8rem; color:var(--text-muted);">إجمالي: $${total.toFixed(2)}</div>
            <div style="font-size:1.3rem; font-weight:800; color:#10b981;">${(total * currentExchangeRate).toFixed(2)} د.ل</div>
          </div>
        </div>`;
      shipmentsContainer.appendChild(card);
    });

    document.getElementById('totalGoodsUSD').textContent = `$${tg.toFixed(2)}`;
    document.getElementById('totalShippingUSD').textContent = `$${ts.toFixed(2)}`;
    document.getElementById('totalExtraUSD').textContent = `$${te.toFixed(2)}`;
    document.getElementById('grandTotalUSD').textContent = `$${(tg+ts+te).toFixed(2)}`;
    document.getElementById('grandTotalLYD').textContent = `${((tg+ts+te) * currentExchangeRate).toFixed(2)} د.ل`;
  }

  window.deleteShipment = (id) => { if(confirm('حذف؟')) remove(ref(db, 'shipments/' + id)); };
  function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }
});
</script>
</body>
</html>
